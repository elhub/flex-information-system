---
openapi: 3.1.0
info:
  title: Flexibility Information System
  description: >-
    API of the Flexibility Information System.
  contact:
    name: Elhub AS
    url: https://elhub.no
    email: post@elhub.no
  version: 1.0-SNAPSHOT

jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base

tags:
  - name: introspection
    description: Infrastructure and health-check endpoints
  - name: controllable_unit
    description: Operations related to controllable units

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      description: >-
        HS256-signed JWT. Pass the token in the `Authorization: Bearer <token>`
        header, or in the `__Host-flex_session` session cookie (browser/OIDC
        sessions). Required claims: `entity_id`, `eid`, `role`, `scope`, `exp`.
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    error_message:
      description: >-
        Error response body
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Short machine-readable error code, e.g. "HTTP400".
          example: HTTP400
        message:
          type: string
          description: Human-readable description of the error.
          example: ill formed request body
        details:
          type: [string, "null"]
          description: Optional extended detail.
          example: null
        hint:
          type: [string, "null"]
          description: Optional hint for the caller.
          example: null

    controllable_unit_lookup_request:
      description: Request body for controllable unit lookup.
      type: object
      required:
        - end_user
      properties:
        end_user:
          type: string
          description: >-
            Norwegian birth number (11 digits) or organisation number (9 digits)
            of the end user.
          pattern: "^[1-9]([0-9]{8}|[0-9]{10})$"
          example: "133700008"
        controllable_unit:
          type: [string, "null"]
          description: >-
            UUID v4 business ID of the controllable unit to look up.
            Mutually exclusive with `accounting_point`.
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
          example: "53919b79-876f-4dad-8bde-b29368367604"
        accounting_point:
          type: [string, "null"]
          description: >-
            Global Service Relation Number (GSRN) - unique identifier for the
            accounting point
            Mutually exclusive with `controllable_unit`.
          pattern: "^[1-9][0-9]{17}$"
          example: "709000000000000057"

    technical_resource:
      description: A technical resource belonging to a controllable unit.
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int32
          description: Surrogate key of the technical resource.
          example: 17
        name:
          type: string
          description: Name of the technical resource.
          example: "Battery Unit A"
        details:
          type: [string, "null"]
          description: Additional details about the technical resource.
          example: "16A"

    controllable_unit:
      description: A controllable unit returned in the lookup response.
      type: object
      required:
        - id
        - business_id
        - name
        - technical_resources
      properties:
        id:
          type: integer
          format: int32
          description: Surrogate key of the controllable unit.
          example: 11
        business_id:
          type: string
          description: UUID v4 business ID of the controllable unit.
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
          example: "53919b79-876f-4dad-8bde-b29368367604"
        name:
          type: string
          description: Human-readable name of the controllable unit.
          example: "Car Charger #54"
        technical_resources:
          type: array
          description: Technical resources belonging to this controllable unit.
          items:
            $ref: "#/components/schemas/technical_resource"

    controllable_unit_accounting_point:
      description: >-
        The accounting point behind which the controllable units are located.
      type: object
      required:
        - id
        - business_id
      properties:
        id:
          type: integer
          format: int32
          description: Surrogate key of the accounting point.
          example: 100351
        business_id:
          type: string
          description: GSRN metering point ID of the accounting point.
          pattern: "^[1-9][0-9]{17}$"
          example: "709000000000000057"

    accounting_point_end_user:
      description: >-
        The end user on the accounting point where the controllable units are
        located.
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          format: int32
          description: Surrogate key of the end user.
          example: 7

    controllable_unit_lookup_response:
      description: Successful response body for controllable unit lookup.
      type: object
      required:
        - accounting_point
        - end_user
        - controllable_units
      properties:
        accounting_point:
          $ref: "#/components/schemas/controllable_unit_accounting_point"
        end_user:
          $ref: "#/components/schemas/accounting_point_end_user"
        controllable_units:
          type: array
          description: >-
            Controllable units found for the given end user and accounting point
            or controllable unit.
          items:
            $ref: "#/components/schemas/controllable_unit"

paths:
  /healthz:
    get:
      operationId: read_health
      summary: Read - Health check
      description: >-
        Returns the health status of the application, including thread deadlock
        detection. This endpoint does not require authentication.
      security: []
      tags:
        - introspection
      responses:
        "200":
          description: Application is healthy.
          content:
            application/json:
              schema:
                type: object
        "503":
          description: Application is unhealthy (e.g. thread deadlock detected).
          content:
            application/json:
              schema:
                type: object

  /metrics:
    get:
      operationId: read_metrics
      summary: Read - Prometheus metrics
      description: >-
        Exposes application metrics in Prometheus text format for scraping.
        This endpoint does not require authentication.
      security: []
      tags:
        - introspection
      responses:
        "200":
          description: Prometheus metrics scraped successfully.
          content:
            text/plain:
              schema:
                type: string

  /controllable_unit/lookup:
    post:
      operationId: call_controllable_unit_lookup
      summary: Call - Controllable unit lookup
      description: >-
        Looks up controllable units for a given end user, identified by either
        an accounting point GSRN or a controllable unit UUID.

        Exactly one of `accounting_point` or `controllable_unit` must be
        provided alongside the mandatory `end_user`.

        If the accounting point is not yet in the local database, it is fetched
        from the Accounting Point Adapter and persisted automatically.

        **Required roles:** `flex_service_provider` or
        `flex_flexibility_information_system_operator`.
      tags:
        - controllable_unit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/controllable_unit_lookup_request"
            examples:
              by_accounting_point:
                summary: Lookup by accounting point
                value:
                  end_user: "133700008"
                  accounting_point: "709000000000000057"
              by_controllable_unit:
                summary: Lookup by controllable unit
                value:
                  end_user: "133700008"
                  controllable_unit: "53919b79-876f-4dad-8bde-b29368367604"
      responses:
        "200":
          description: Lookup succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/controllable_unit_lookup_response"
              example:
                accounting_point:
                  id: 100351
                  business_id: "709000000000000057"
                end_user:
                  id: 7
                controllable_units:
                  - id: 11
                    business_id: "53919b79-876f-4dad-8bde-b29368367604"
                    name: "Car Charger #54"
                    technical_resources:
                      - id: 17
                        name: "Battery Unit A"
                        details: "16A"
        "400":
          description: >-
            Bad request — malformed body, missing `end_user`, invalid
            `end_user` format, invalid GSRN, invalid UUID, or both/neither
            `accounting_point` and `controllable_unit` provided.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error_message"
              example:
                code: HTTP400
                message: missing end user business ID
        "401":
          description: >-
            Unauthorized — missing token, invalid/expired JWT, or the
            caller's role is not allowed to perform this operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error_message"
              example:
                code: HTTP401
                message: user cannot perform this operation
        "403":
          description: >-
            Forbidden — the end user does not match the accounting point or
            controllable unit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error_message"
              example:
                code: HTTP403
                message: end user does not match accounting point / controllable unit
        "404":
          description: >-
            Not found — the controllable unit does not exist in the database,
            or the accounting point does not exist locally or in the datahub.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error_message"
              example:
                code: HTTP404
                message: accounting point does not exist
        "422":
          description: >-
            Unprocessable entity — the accounting point exists in the datahub
            but has no metering grid area associated with it.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error_message"
              example:
                code: HTTP422
                message: accounting point has no metering grid area
        "500":
          description: >-
            Internal server error — database failure during sync or lookup, or
            the adapter returned an unexpected error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error_message"
              example:
                code: HTTP500
                message: Try again later

servers:
  - url: http://localhost:8080
    description: Local development (default port)
