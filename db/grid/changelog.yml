---
databaseChangeLog:
  - changeSet:
      id: grid-schema
      author: flex
      runOnChange: true
      changes:
        - sql: CREATE SCHEMA IF NOT EXISTS grid AUTHORIZATION flex
        - sql: GRANT USAGE ON SCHEMA grid TO flex_internal_event_notification, flex_internal
        - sql: GRANT USAGE ON SCHEMA grid TO flex_operation_readonly, flex_operation_update, flex_operation_readwrite
  - includeAll:
      path: ./
      relativeToChangelogFile: true
      endsWithFilter: .sql
      minDepth: 1
      maxDepth: 1
      # Revers sort to ensure that <resource>.sql is run before <resource>_<something>.sql
      resourceComparator: java.util.Comparator.reverseOrder
  - includeAll:
      path: ./grants/
      relativeToChangelogFile: true
      endsWithFilter: .sql
