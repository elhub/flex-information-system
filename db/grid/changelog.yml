---
databaseChangeLog:
  - changeSet:
      id: grid-schema
      author: flex
      runOnChange: true
      changes:
        - sql: CREATE SCHEMA IF NOT EXISTS grid AUTHORIZATION flex
        - sql: GRANT USAGE ON SCHEMA grid TO flex_anonymous, flex_internal
        - sql: GRANT USAGE ON SCHEMA grid TO flex_operation_readonly, flex_operation_update, flex_operation_readwrite
        - sql: ALTER DEFAULT PRIVILEGES IN SCHEMA grid REVOKE EXECUTE ON FUNCTIONS FROM PUBLIC
  - changeSet:
      id: grid-schema-drop
      author: flex
      runOnChange: false
      changes:
        # recreated by dedicated migrations (runOnChange, changed in current PR)
        - sql: DROP FUNCTION IF EXISTS grid.substation_distance(double precision, double precision)
        - sql: DROP VIEW IF EXISTS grid.substation
        - sql: DROP VIEW IF EXISTS grid.substation_cluster
        - sql: DROP VIEW IF EXISTS grid.line
  - includeAll:
      path: ./
      relativeToChangelogFile: true
      endsWithFilter: .sql
      minDepth: 1
      maxDepth: 1
      # Revers sort to ensure that <resource>.sql is run before <resource>_<something>.sql
      resourceComparator: java.util.Comparator.reverseOrder
  - includeAll:
      path: ./grants/
      relativeToChangelogFile: true
      endsWithFilter: .sql
