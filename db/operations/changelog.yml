---
databaseChangeLog:
  - changeSet:
      id: operations-schema
      author: flex
      runOnChange: true
      changes:
        - sql: CREATE SCHEMA IF NOT EXISTS operations AUTHORIZATION flex
  - includeAll:
      path: ./
      relativeToChangelogFile: true
      endsWithFilter: .sql
      minDepth: 1
      maxDepth: 1
