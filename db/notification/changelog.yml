---
databaseChangeLog:
  - changeSet:
      id: notification-schema
      author: flex
      runOnChange: true
      changes:
        - sql: CREATE SCHEMA IF NOT EXISTS notification AUTHORIZATION flex
        - sql: GRANT USAGE ON SCHEMA notification TO flex_internal_event_notification, flex_internal
        - sql: GRANT USAGE ON SCHEMA notification TO flex_operation_readonly, flex_operation_update, flex_operation_readwrite
        - sql: ALTER DEFAULT PRIVILEGES IN SCHEMA notification REVOKE EXECUTE ON FUNCTIONS FROM PUBLIC
  - includeAll:
      path: ./
      relativeToChangelogFile: true
      endsWithFilter: .sql
      minDepth: 1
      maxDepth: 1
