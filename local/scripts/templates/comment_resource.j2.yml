{%- set resource_spaces = resource | replace("_", " ") %}
data:
  id: {{ resource }}_comment
  module: {{ data.module }}
  acronym: {{ data.acronym }}C
  summary: {{ data.summary }} Comment
  description: >-
    Comment made by a party involved in a {{ resource_spaces }}.
  operations:
    - list
    - read
    - create
    - update
  audit: true
  generate_views: true
  history:
    - list
    - read
  history_rls: false
  properties:
    id:
      description: Unique surrogate identifier.
      format: bigint
      type: integer
      readOnly: true
      x-filter: true
      example: 9
    {{ resource }}_id:
      description: Reference to the {{ resource_spaces }}.
      format: bigint
      type: integer
      x-no-update: true
      x-filter: true
      x-foreign-key:
        resource: {{ resource }}
        field: id
        cardinality: many-to-one
      example: 7
    created_by:
      description: Reference to the identity that created the comment.
      format: bigint
      type: integer
      readOnly: true
      example: 94
    created_at:
      description: When the comment was added to the {{ data.acronym }}.
      format: date-time
      type: string
      readOnly: true
      example: 2022-08-08T12:00:00+02:00
    visibility:
      description: The level of visibility of the comment.
      format: text
      type: string
      default: same_party
      enum:
        - id: same_party
        - id: same_party_type
          x-intl:
            en: Same party type
            nb: Samme aktørtype
            nn: Same aktørtype
        - id: any_involved_party
      example: same_party
      x-details: >-
        Comments marked `same_party` are visible only to the party that creates
        them. Comments marked `same_party_type` are visible to all involved
        parties of the same type as the creator (e.g. all involved system
        operators). Comments marked `any_involved_party` can be seen by all
        parties involved in the {{ data.acronym }}.
    content:
      description: Free text content of the comment.
      format: text
      type: string
      maxLength: 2048
      example: Missing document.
      x-details: >-
        This field can contain rich text in raw HTML format. Its content
        should be sanitised on the client side before being displayed, as
        there is currently no check performed on the server.
